<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสินค้า - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="text-2xl font-bold">product555<span class="text-amber-400">.</span>db <span class="text-xs text-gray-500">(Firebase)</span></div>
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2.5 h-2.5 bg-gray-500 rounded-full"></div>
                    <span id="status-text" class="text-sm text-gray-400">กำลังเชื่อมต่อ...</span>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 p-6">
            <div class="lg:w-96 bg-gray-900 rounded-2xl border border-gray-800 p-6 self-start">
                <h2 id="form-title" class="text-xl font-semibold mb-6">เพิ่มสินค้าใหม่</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1.5">ชื่อสินค้า</label>
                        <input type="text" id="name" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:border-blue-500 outline-none" placeholder="ชื่อสินค้า">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1.5">ราคา (บาท)</label>
                        <input type="number" id="price" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:border-blue-500 outline-none" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1.5">รายละเอียดสินค้า</label>
                        <textarea id="detail" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:border-blue-500 outline-none resize-none" placeholder="รายละเอียดสินค้า..."></textarea>
                    </div>
                </div>
                <div class="mt-8 flex gap-3">
                    <button onclick="submitProduct()" id="submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3.5 rounded-xl font-medium">➕ เพิ่มสินค้า</button>
                    <button onclick="cancelEdit()" id="cancel-btn" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3.5 rounded-xl font-medium hidden">ยกเลิก</button>
                </div>
            </div>

            <div class="flex-1">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">รายการสินค้า</h2>
                    <div id="count-badge" class="bg-gray-800 px-4 py-2 rounded-full text-sm">0 รายการ</div>
                </div>
                <div id="products" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
